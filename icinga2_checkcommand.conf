// =============================================================================
// Icinga2 CheckCommand definition for check_rabbitmq
// =============================================================================
// Place this file in: /etc/icinga2/zones.d/global-templates/commands/check_rabbitmq.conf
// Or alternatively:   /etc/icinga2/conf.d/commands/check_rabbitmq.conf
//
// Adjust the PluginDir or use a custom path as needed.
// =============================================================================

object CheckCommand "rabbitmq" {
    command = [ "/usr/lib64/nagios/plugins/check_rabbitmq" ]

    arguments = {
        "--mode" = {
            value = "$rabbitmq_mode$"
            description = "Check mode: publish_consume, queue_exists, queue_count, exchange_count, cluster_health"
            required = true
        }
        "--host" = {
            value = "$rabbitmq_host$"
            description = "RabbitMQ hostname or IP"
        }
        "--username" = {
            value = "$rabbitmq_username$"
            description = "RabbitMQ username"
        }
        "--password" = {
            value = "$rabbitmq_password$"
            description = "RabbitMQ password"
        }
        "--vhost" = {
            value = "$rabbitmq_vhost$"
            description = "AMQP vhost"
        }
        "--timeout" = {
            value = "$rabbitmq_timeout$"
            description = "Connection timeout in seconds"
        }
        "--amqp-port" = {
            value = "$rabbitmq_amqp_port$"
            description = "AMQP port"
        }
        "--amqps" = {
            set_if = "$rabbitmq_amqps$"
            description = "Use AMQPS (TLS)"
        }
        "--mgmt-port" = {
            value = "$rabbitmq_mgmt_port$"
            description = "Management API port"
        }
        "--mgmt-ssl" = {
            set_if = "$rabbitmq_mgmt_ssl$"
            description = "Use HTTPS for Management API"
        }
        "--ssl-ca-cert" = {
            value = "$rabbitmq_ssl_ca_cert$"
            description = "Path to CA certificate file"
        }
        "--ssl-cert" = {
            value = "$rabbitmq_ssl_cert$"
            description = "Client certificate for mutual TLS"
        }
        "--ssl-key" = {
            value = "$rabbitmq_ssl_key$"
            description = "Client private key for mutual TLS"
        }
        "--ssl-no-verify" = {
            set_if = "$rabbitmq_ssl_no_verify$"
            description = "Disable TLS certificate verification"
        }
        "--warning" = {
            value = "$rabbitmq_warning$"
            description = "Warning threshold"
        }
        "--critical" = {
            value = "$rabbitmq_critical$"
            description = "Critical threshold"
        }
        "--queue-name" = {
            value = "$rabbitmq_queue_name$"
            description = "Queue name (for queue_exists mode)"
        }
        "--filter-vhost" = {
            value = "$rabbitmq_filter_vhost$"
            description = "Filter by vhost (for queue_count/exchange_count)"
        }
        "--include-defaults" = {
            set_if = "$rabbitmq_include_defaults$"
            description = "Include default AMQP exchanges in count"
        }
    }

    vars.rabbitmq_host = "$address$"
    vars.rabbitmq_username = "monitor"
    vars.rabbitmq_password = ""
    vars.rabbitmq_vhost = "/"
    vars.rabbitmq_timeout = 10
    vars.rabbitmq_amqp_port = 5672
    vars.rabbitmq_mgmt_port = 15672
    vars.rabbitmq_amqps = false
    vars.rabbitmq_mgmt_ssl = false
    vars.rabbitmq_ssl_no_verify = false
    vars.rabbitmq_include_defaults = false
}


// =============================================================================
// Example Service definitions
// =============================================================================
// Place these in your host/service configuration, e.g.:
//   /etc/icinga2/zones.d/<zone>/services/rabbitmq.conf
// =============================================================================

// --- Host template for RabbitMQ nodes ---

template Host "rabbitmq-node" {
    vars.rabbitmq_username = "monitor"
    // vars.rabbitmq_password = "set-via-api-or-vault"
    vars.rabbitmq_vhost = "/"
}


// --- Service: Publish/Consume roundtrip (AMQP functional test) ---

apply Service "rabbitmq-publish-consume" {
    import "generic-service"

    check_command = "rabbitmq"
    vars.rabbitmq_mode = "publish_consume"
    vars.rabbitmq_warning = 1000    // warn if roundtrip > 1s
    vars.rabbitmq_critical = 5000   // crit if roundtrip > 5s

    // Run every 5 minutes
    check_interval = 5m
    retry_interval = 1m

    assign where "rabbitmq" in host.groups
}


// --- Service: Cluster health ---

apply Service "rabbitmq-cluster-health" {
    import "generic-service"

    check_command = "rabbitmq"
    vars.rabbitmq_mode = "cluster_health"

    check_interval = 2m
    retry_interval = 30s

    assign where "rabbitmq" in host.groups
}


// --- Service: Queue count ---

apply Service "rabbitmq-queue-count" {
    import "generic-service"

    check_command = "rabbitmq"
    vars.rabbitmq_mode = "queue_count"
    vars.rabbitmq_warning = 100
    vars.rabbitmq_critical = 500

    check_interval = 5m
    retry_interval = 1m

    assign where "rabbitmq" in host.groups
}


// --- Service: Exchange count ---

apply Service "rabbitmq-exchange-count" {
    import "generic-service"

    check_command = "rabbitmq"
    vars.rabbitmq_mode = "exchange_count"
    vars.rabbitmq_warning = 50
    vars.rabbitmq_critical = 100

    check_interval = 10m
    retry_interval = 2m

    assign where "rabbitmq" in host.groups
}


// --- Service: Check specific queue exists ---
// Use this as a template; override rabbitmq_queue_name per-host or via apply rule

apply Service "rabbitmq-queue-" for (queue_name => queue_config in host.vars.rabbitmq_queues) {
    import "generic-service"

    check_command = "rabbitmq"
    vars.rabbitmq_mode = "queue_exists"
    vars.rabbitmq_queue_name = queue_name

    // Merge any per-queue overrides (e.g. vhost)
    vars += queue_config

    check_interval = 3m
    retry_interval = 1m

    assign where host.vars.rabbitmq_queues
}

